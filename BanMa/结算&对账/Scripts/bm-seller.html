:root {
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --success: #059669;
  --success-light: #d1fae5;
  --warning: #d97706;
  --warning-light: #fff7ed;
  --sidebar-w: 220px;
  --header-h: 56px;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-400: #9ca3af;
  --gray-600: #4b5563;
  --gray-800: #1f2937;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  font-size: 14px; color: var(--gray-800); background: var(--gray-100);
  min-height: 100vh;
}

.app-shell { display: flex; height: 100vh; }
.app-sidebar {
  width: var(--sidebar-w); background: #fff; border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.app-logo {
  height: var(--header-h); display: flex; align-items: center; padding: 0 16px;
  font-weight: 700; border-bottom: 1px solid var(--gray-200); gap: 8px;
}
.app-logo.seller { color: #7c3aed; }
.app-logo.platform { color: var(--primary); }
.app-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
.app-nav-group {
  padding: 8px 16px 4px; font-size: 11px; color: var(--gray-400);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.app-nav-item {
  padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  color: var(--gray-600); font-size: 13px;
}
.app-nav-item:hover { background: var(--gray-50); }
.app-nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.app-sidebar-foot { padding: 12px 16px; border-top: 1px solid var(--gray-200); font-size: 12px; }
.app-sidebar-foot a { color: var(--primary); text-decoration: none; }

.app-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.app-header {
  height: var(--header-h); background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
}
.app-header-title { font-size: 15px; font-weight: 600; }
.app-header-actions { display: flex; align-items: center; gap: 10px; }
.app-content { flex: 1; overflow: auto; padding: 20px 24px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: 6px; border: none; cursor: pointer; font-size: 13px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: #fff; border: 1px solid var(--gray-200); color: var(--gray-600); }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-success { background: var(--success-light); color: var(--success); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-ghost { background: transparent; border: none; color: var(--primary); cursor: pointer; font-size: 13px; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--gray-100); }
.data-table th { font-size: 12px; color: var(--gray-400); font-weight: 500; background: var(--gray-50); }
.data-table tr { cursor: pointer; }
.data-table tr:hover td { background: var(--gray-50); }
.data-table tr.no-click { cursor: default; }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--gray-600); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 8px 10px; border: 1px solid var(--gray-200);
  border-radius: 6px; font-size: 13px;
}
.form-textarea { min-height: 72px; resize: vertical; }
.form-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

.page-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.page-title { font-size: 18px; font-weight: 600; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }

.card { background: #fff; border: 1px solid var(--gray-200); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.card-flat { background: #fff; border: 1px solid var(--gray-200); border-radius: 8px; padding: 0; overflow: hidden; margin-bottom: 12px; }

.badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; display: inline-block; }
.badge-green { background: var(--success-light); color: var(--success); }
.badge-gray { background: var(--gray-100); color: var(--gray-600); }
.badge-orange { background: var(--warning-light); color: var(--warning); }
.badge-blue { background: var(--primary-light); color: var(--primary); }
.badge-red { background: var(--danger-light); color: var(--danger); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal { background: #fff; border-radius: 10px; width: min(520px, 92vw); max-height: 90vh; overflow: auto; }
.modal.modal-lg { width: min(640px, 92vw); display: flex; flex-direction: column; }
.modal.modal-lg .modal-body { flex: 1; overflow: auto; }
.modal-header {
  padding: 14px 18px; border-bottom: 1px solid var(--gray-100);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-body { padding: 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--gray-100); display: flex; justify-content: flex-end; gap: 8px; }

.drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200;
  display: flex; justify-content: flex-end;
}
.drawer { width: min(640px, 100vw); background: #fff; height: 100%; overflow: auto; }
.drawer-header {
  padding: 16px 20px; border-bottom: 1px solid var(--gray-100);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.drawer-body { padding: 20px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--gray-800); color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.25s;
}
.toast.show { opacity: 1; }

.chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 6px 12px; border: 1px solid var(--gray-200); border-radius: 20px;
  font-size: 12px; cursor: pointer; background: #fff;
}
.chip.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); font-weight: 600; }

.stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: #fff; border: 1px solid var(--gray-200); border-radius: 8px; padding: 16px;
}
.stat-card.debt { border-color: #fecaca; background: var(--danger-light); }
.stat-label { font-size: 12px; color: var(--gray-400); margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-value.debt { color: var(--danger); }
.stat-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

.summary-bar {
  display: flex; gap: 24px; padding: 14px 16px; background: var(--primary-light);
  border-radius: 8px; margin-bottom: 16px; font-size: 13px;
}
.summary-bar strong { color: var(--primary); }

.timeline { border-left: 2px solid var(--gray-200); padding-left: 16px; margin: 12px 0; }
.timeline-item { margin-bottom: 12px; position: relative; }
.timeline-item::before {
  content: ''; position: absolute; left: -21px; top: 4px;
  width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
}
.timeline-time { font-size: 11px; color: var(--gray-400); }
.timeline-desc { font-size: 13px; margin-top: 2px; }

.alert {
  padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px;
}
.alert-warning { background: var(--warning-light); border: 1px solid #fed7aa; color: #92400e; }
.alert-info { background: var(--primary-light); border: 1px solid #bfdbfe; color: #1e40af; }
.alert-danger { background: var(--danger-light); border: 1px solid #fecaca; color: #991b1b; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 16px; }
.detail-item label { display: block; font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
.detail-item span { font-size: 14px; }

.section-title { font-size: 14px; font-weight: 600; margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--gray-100); }

.empty-state { text-align: center; padding: 40px; color: var(--gray-400); }

@media (max-width: 1100px) {
  .stat-grid { grid-template-columns: repeat(3, 1fr); }
}



.app-nav-item.active { background: #f5f3ff; color: #7c3aed; }
.btn-primary { background: #7c3aed; }
.btn-primary:hover { background: #6d28d9; }

html, body { width: 100%; }

.seller-single .withdraw-cta { padding: 22px 28px; }
.seller-single .withdraw-cta .amount { font-size: 32px; }
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--gray-200); margin-bottom: 16px;
  background: #fff; border-radius: 8px 8px 0 0; padding: 0 8px;

.tab-bar .tab-item {
  padding: 12px 24px; font-size: 14px; cursor: pointer; color: var(--gray-600);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab-bar .tab-item.active { color: #7c3aed; border-bottom-color: #7c3aed; font-weight: 600; }
.list-panel {
  background: #fff; border: 1px solid var(--gray-200); border-radius: 0 0 8px 8px;

.list-wrap { background: #fff; border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
.list-wrap .tab-bar { background: transparent; border-radius: 0; margin-bottom: 0; border-bottom: 1px solid var(--gray-200); }
.list-wrap .filter-bar { padding: 16px 20px 0; margin-bottom: 12px; }

.withdraw-cta {

  padding: 20px 24px; margin-bottom: 20px;

.withdraw-cta .amount { font-size: 28px; font-weight: 700; color: #7c3aed; }

  function fmtDate(iso) {

      try {

      if (!state.version || state.version < 2) {
        return this.migrateState(deepClone(global.BM_DEMO));
      }
      if (state.account) {
        state.account.withdrawn = state.account.withdrawn ?? state.account.settled ?? 0;

        delete state.account.settled;

      });
      (state.withdrawals || []).forEach((w) => {
        w.shopId = w.shopId ?? w.merchantId;

        s.bizRefId = s.bizRefId ?? s.withdrawalId ?? s.aftersaleId ?? '';

      });

    saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); },
    resetDemo() { const s = deepClone(global.BM_DEMO); this.saveState(s); return s; },

    getTotalAssets(account) {
      return (account.pendingCredit || 0) + (account.withdrawable || 0) + (account.withdrawing || 0) + (account.withdrawn || 0);
    },
    getNetWithdrawable(state) {
      return Math.max(0, (state.account.withdrawable || 0) - (state.account.pendingOffset || 0));
    },
    canApplyWithdrawal(state) {
      const acc = state.account;
      if (this.getActiveWithdrawal(state)) return { ok: false, msg: '已有进行中的提现申请' };
      if ((acc.withdrawable || 0) <= 0) return { ok: false, msg: '当前无可提现金额' };
      if ((acc.withdrawable || 0) <= (acc.pendingOffset || 0)) return { ok: false, msg: '可提现金额须大于待冲抵金额方可提现' };
      return { ok: true };
    },
    getWithdrawableOrders(state) {
      return (state.orders || []).filter((o) => o.accountStatus === '可提现');
    },
    getActiveWithdrawal(state) {
      return (state.withdrawals || []).find((w) => w.status === WITHDRAWAL_STATUS.PENDING_AUDIT || w.status === WITHDRAWAL_STATUS.PENDING_PAY);
    },
    getSettlementByBizRef(state, bizRefId) {
      return (state.settlements || []).find((s) => s.bizRefId === bizRefId);

    getSettlementByWithdrawal(state, withdrawalId) {
      return this.getSettlementByBizRef(state, withdrawalId);

    getRelatedOffsetAftersales(state) {

    },
    getProcessingDurationDays(a) {
      if (!a.acceptedAt) return 0;

    nextId(state, key, prefix) {
      const n = state.nextIds[key] || 1;

    addLog(state, type, desc) {
      if (!state.activityLog) state.activityLog = [];

    addOffsetRecord(state, record) {
      if (!state.offsetRecords) state.offsetRecords = [];

    upsertAftersaleFund(state, aftersale, createdAt) {
      if (!aftersale || !(aftersale.shopPayable > 0) || aftersale.liabilityParty !== '店铺有责') return;

        refundAmount: aftersale.refundAmount || 0,
        platformPayable: aftersale.platformPayable || 0,

        clearedAt: '',

        verifyVouchers: [],

      const idx = state.aftersaleFunds.findIndex((f) => f.aftersaleId === aftersale.id);

      return [...names].sort();
    },

    getAftersaleFunds(state, tab, filters = {}) {
      let list = (state.aftersaleFunds || []).slice();
      if (tab === 'pending') list = list.filter((f) => f.offsetStatus === OFFSET_STATUS.PENDING);
      else if (tab === 'cleared') list = list.filter((f) => f.offsetStatus === OFFSET_STATUS.CLEARED);
      else if (tab === 'verified') list = list.filter((f) => f.offsetStatus === OFFSET_STATUS.VERIFIED);
      if (filters.shopName) list = list.filter((f) => f.shopName === filters.shopName);
      if (filters.aftersaleId) {
        const q = String(filters.aftersaleId).trim().toLowerCase();
        list = list.filter((f) => f.aftersaleId.toLowerCase().includes(q));
      }
      return list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      const note = (opts.note || '').trim();
      const vouchers = (opts.vouchers || []).slice();
      const t = nowISO();
      let total = 0;

      ids.forEach((aid) => {

        if (!fund || fund.offsetStatus !== OFFSET_STATUS.PENDING) return;

        const amt = fund.shopPayable || 0;
        total += amt;
        count += 1;
        state.account.pendingOffset = Math.max(0, (state.account.pendingOffset || 0) - amt);
        const desc = note
          ? `财务核销待冲抵，店铺线下转账已核实到账（${note}）`
          : '财务核销待冲抵，店铺线下转账已核实到账';
        this.addOffsetRecord(state, {
          type: '消除',

      const w = (state.withdrawals || []).find((x) => x.id === withdrawalId);
      if (!w || w.status !== WITHDRAWAL_STATUS.PENDING_AUDIT) return { ok: false, msg: '状态不允许驳回' };
      if (!reason?.trim()) return { ok: false, msg: '请填写驳回原因' };
      const s = this.getSettlementByBizRef(state, w.id);
      w.status = WITHDRAWAL_STATUS.REJECTED;
      w.rejectReason = reason.trim();
      w.auditor = '运营审核员';
      w.auditTime = nowISO();
      if (s) s.status = SETTLEMENT_STATUS.VOID;
      state.account.withdrawable = (state.account.withdrawable || 0) + w.amount;
      state.account.withdrawing = Math.max(0, (state.account.withdrawing || 0) - w.amount);
      this.addLog(state, '提现驳回', `${w.id} 已驳回`);
      this.saveState(state);
      return { ok: true };
    },

    registerSettlementPayment(state, settlementId, payment) {
      const s = (state.settlements || []).find((x) => x.id === settlementId);
      if (!s) return { ok: false, msg: '结算单不存在' };
      if (s.status !== SETTLEMENT_STATUS.PENDING_PAY) return { ok: false, msg: '该结算单不可打款' };
      const t = nowISO();
      s.status = SETTLEMENT_STATUS.PAID;
      s.payment = {
        registerTime: t,
        note: payment.note || '',
        vouchers: (payment.vouchers || []).slice(),
      };

      if (s.settleType === SETTLE_TYPE.WITHDRAW) {
        const w = (state.withdrawals || []).find((x) => x.id === s.bizRefId);
        if (w) {
          w.status = WITHDRAWAL_STATUS.COMPLETED;
          w.payRegisterTime = t;
          state.account.withdrawn = (state.account.withdrawn || 0) + w.amount;
          state.account.withdrawing = Math.max(0, (state.account.withdrawing || 0) - w.amount);
          const offsetAmt = w.pendingOffsetAmount || 0;
          state.account.pendingOffset = 0;
          if (offsetAmt > 0) {
            this.markAftersaleFundsClearedOnWithdraw(state, w, t);
            this.addOffsetRecord(state, {
              type: '消除',
              amount: offsetAmt,
              balanceAfter: 0,
              refId: w.id,
              refType: '提现单',
              description: `提现打款完成，待冲抵 ${fmtMoney(offsetAmt)} 从提现金额中抵扣并归零`,
              createdAt: t,
            });
          }
        }
        (s.orders || []).forEach((o) => {
          const order = (state.orders || []).find((x) => x.id === o.orderId);
          if (order) order.accountStatus = '已提现';
        });
        this.addLog(state, '提现打款', `结算单 ${s.id} 已打款，店铺待冲抵归零`);
      } else if (s.settleType === SETTLE_TYPE.REFUND) {
        const a = (state.aftersales || []).find((x) => x.id === s.bizRefId);
        if (a) a.status = AFTERSALE_STATUS.COMPLETED;
        this.addLog(state, '售后打款', `结算单 ${s.id} 已打款，售后单 ${s.bizRefId} 已完结`);
      }
      this.saveState(state);
      return { ok: true };
    },

    batchMarkPaid(state, settlementIds, payment) {
      const ids = settlementIds || [];
      if (!ids.length) return { ok: false, msg: '请选择结算单' };
      const payload = typeof payment === 'string'
        ? { note: payment || '批量标记打款', vouchers: [] }
        : { note: payment?.note || '批量标记打款', vouchers: payment?.vouchers || [] };
      ids.forEach((id) => this.registerSettlementPayment(state, id, payload));
      return { ok: true, count: ids.length };
    },

    acceptAftersale(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PENDING) return { ok: false, msg: '状态不允许受理' };
      a.status = AFTERSALE_STATUS.PROCESSING;
      a.handler = a.handler || '客服专员';
      a.acceptedAt = nowISO();
      this.saveState(state);
      return { ok: true };
    },

    updateAftersaleFields(state, id, fields) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a) return { ok: false, msg: '售后单不存在' };
      if (a.status === AFTERSALE_STATUS.COMPLETED || a.status === AFTERSALE_STATUS.REJECTED || a.status === AFTERSALE_STATUS.REFUNDING) {
        return { ok: false, msg: '当前状态不可编辑' };
      }
      const needRefund = fields.needRefund ?? a.needRefund ?? '';
      const refund = Number(fields.refundAmount) || 0;
      const shop = Number(fields.shopPayable) || 0;
      const platform = Number(fields.platformPayable) || 0;
      if (needRefund === '是' && refund > 0 && Math.abs(refund - shop - platform) > 0.01) {
        return { ok: false, msg: '退款金额须等于店铺应付 + 平台应付' };
      }
      const patch = {
        aftersaleType: fields.aftersaleType ?? a.aftersaleType,
        needRefund,
        note: fields.note ?? a.note,
      };
      if (needRefund === '是') {
        Object.assign(patch, {
          liabilityParty: fields.liabilityParty ?? a.liabilityParty,
          refundAmount: refund,
          shopPayable: shop,
          platformPayable: platform,
          payeeName: fields.payeeName ?? a.payeeName,
          payeeAccount: fields.payeeAccount ?? a.payeeAccount,
          payeeBank: fields.payeeBank ?? a.payeeBank,
          payeePurpose: fields.payeePurpose ?? a.payeePurpose,
        });
      } else if (needRefund === '否') {
        Object.assign(patch, {
          liabilityParty: '',
          refundAmount: 0, shopPayable: 0, platformPayable: 0,
          payeeName: '', payeeAccount: '', payeeBank: '', payeePurpose: '',
        });
      }
      Object.assign(a, patch);
      this.saveState(state);
      return { ok: true };
    },

    rejectAftersale(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PROCESSING) return { ok: false, msg: '状态不允许拒绝' };
      a.status = AFTERSALE_STATUS.REJECTED;
      this.saveState(state);
      return { ok: true };
    },

    completeAftersaleNoRefund(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PROCESSING) return { ok: false, msg: '状态不允许完结' };
      if (a.needRefund !== '否') return { ok: false, msg: '请选择「是否需要退款」为否' };
      a.status = AFTERSALE_STATUS.COMPLETED;
      this.saveState(state);
      return { ok: true };
    },

    confirmRefund(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PROCESSING) return { ok: false, msg: '仅处理中状态可确认退款' };
      if (a.needRefund !== '是') return { ok: false, msg: '请选择「是否需要退款」为是' };
      if (!a.refundAmount || a.refundAmount <= 0) return { ok: false, msg: '请填写退款金额' };
      if (!a.payeeName || !a.payeeAccount) return { ok: false, msg: '请填写买家收款信息' };
      const sId = this.nextId(state, 'settlement', 'STL');
      const t = nowISO();
      state.settlements.unshift({
        id: sId, settleType: SETTLE_TYPE.REFUND, bizRefId: a.id,
        shopId: state.merchant.id, shopName: state.merchant.name, shopType: '店铺',
        payeeName: a.payeeName, payeeAccount: a.payeeAccount, payeeBank: a.payeeBank || '支付宝', payeePurpose: a.payeePurpose || '售后退款',
        createdAt: t, totalAmount: a.refundAmount, orderCount: 0,
        userPaidTotal: 0, feeTotal: 0, compTotal: 0, status: SETTLEMENT_STATUS.PENDING_PAY,
        orders: [],
        aftersaleItems: [{
          aftersaleId: a.id, productName: a.productName, shopName: state.merchant.name,
          refundAmount: a.refundAmount, platformPayable: a.platformPayable, shopPayable: a.shopPayable, paymentFee: 0,
        }],
        payment: null,
      });
      a.status = AFTERSALE_STATUS.REFUNDING;
      a.settlementId = sId;
      if (a.liabilityParty === '店铺有责' && (a.shopPayable || 0) > 0) {
        state.account.pendingOffset = (state.account.pendingOffset || 0) + a.shopPayable;
        this.addOffsetRecord(state, {
          type: '产生',
          amount: a.shopPayable,
          refId: a.id,
          refType: '售后单',
          description: `店铺有责售后退款，店铺应付 ${fmtMoney(a.shopPayable)} 计入待冲抵`,
          createdAt: t,
        });
        this.upsertAftersaleFund(state, a, t);
      }
      this.addLog(state, '确认退款', `${a.id} 创建结算单 ${sId}，进入退款中`);
      this.saveState(state);
      return { ok: true, settlementId: sId };
    },

    getReportShopOptions(state) {
      const names = new Set();
      (state.orders || []).forEach((o) => names.add(o.shopName || state.merchant?.name || '—'));
      return [...names].sort();
    },

    getFinancialReport(state, filters = {}) {
      const start = filters.startDate || '2026-05-01';
      const end = filters.endDate || '2026-05-31';
      const shop = filters.shopName || '';
      return (state.orders || []).filter((o) => {
        if (o.status !== '交易完成' || !o.completedAt) return false;
        const d = o.completedAt.slice(0, 10);
        if (d < start || d > end) return false;
        if (shop && (o.shopName || state.merchant?.name) !== shop) return false;
        return true;
      });
    },

    exportFinancialReportCsv(state, filters) {
      const rows = this.getFinancialReport(state, filters);
      const header = ['订单号', '店铺名称', '商品', '用户实付', '店铺应结算', '平台服务费', '支付服务费', '履约扣除'];
      const lines = ['\uFEFF' + header.join(',')];
      rows.forEach((o) => {
        lines.push([o.id, o.shopName || state.merchant.name, o.productName, o.userPaid, o.shopSettle ?? o.settleAmount, o.platformFee, o.paymentFee || 0, o.compensation].join(','));
      });
      return lines.join('\n');
    },

    exportBatchTransferCsv(state, settlementIds) {
      const header = ['收款方名称', '收款方账号', '收款方开户行', '金额', '附言/用途', '结算单号', '关联业务单号'];
      const lines = ['\uFEFF' + header.join(',')];
      (settlementIds || []).forEach((id) => {
        const s = (state.settlements || []).find((x) => x.id === id);
        if (s && s.status === SETTLEMENT_STATUS.PENDING_PAY) {
          lines.push([s.payeeName, s.payeeAccount, s.payeeBank || '', s.totalAmount, s.payeePurpose || '', s.id, s.bizRefId].join(','));
        }
      });
      return lines.join('\n');
    },

    exportSettlementCsv(state, settlementId) {
      const s = (state.settlements || []).find((x) => x.id === settlementId);
      if (!s) return '';
      const lines = ['\uFEFF结算单导出'];
      lines.push(`结算单号,${s.id}`);
      lines.push(`结算类型,${s.settleType}`);
      lines.push(`关联业务单号,${s.bizRefId}`);
      lines.push(`结算金额,${s.totalAmount}`);
      lines.push(`收款方,${s.payeeName},${s.payeeAccount},${s.payeeBank}`);
      if (s.settleType === SETTLE_TYPE.WITHDRAW) {
        lines.push('', '订单明细', '序号,订单号,商品,用户实付,平台服务费,支付服务费,履约包赔,应结金额');
        (s.orders || []).forEach((o) => lines.push([o.seq, o.orderId, o.productName, o.userPaid, o.platformFee, o.paymentFee || 0, o.compensation, o.settleAmount].join(',')));
      } else {
        lines.push('', '售后明细', '售后单号,商品,退款金额,平台应付,店铺应付');
        (s.aftersaleItems || []).forEach((o) => lines.push([o.aftersaleId, o.productName, o.refundAmount, o.platformPayable, o.shopPayable].join(',')));
      }
      return lines.join('\n');
    },

    statusBadgeClass(status) {
      const map = {
        '待审核': 'badge-orange', '待打款': 'badge-blue', '已驳回': 'badge-red', '已完结': 'badge-green',
        '待处理': 'badge-orange', '处理中': 'badge-blue', '退款中': 'badge-blue', '已拒绝': 'badge-gray',
        '已作废': 'badge-gray', '已打款': 'badge-green',
      };
      return map[status] || 'badge-gray';
    },
  };

  global.BMStore = BMStore;
})(typeof window !== 'undefined' ? window : global);

  </script>
  <script>
/**
 * 店铺端可交互原型 (V5)
 */
(function () {
  const S = BMStore;
  let state = S.loadState();
  let route = { page: 'account', id: '' };
  let ui = {
    listTab: 'orders',
    orderWithdrawFilter: '',
    orderDateFrom: '',
    orderDateTo: '',
    withdrawStatusFilter: '',
    withdrawDateFrom: '',
    withdrawDateTo: '',
    offsetTypeFilter: '',
    offsetDateFrom: '',
    offsetDateTo: '',
  };

  function getOrderWithdrawStatus(o) {
    if (o.accountStatus === '已提现' || o.accountStatus === '已结算') return '已提现';
    if (o.accountStatus === '待入账') return '待入账';
    return '可提现';
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show';
    setTimeout(() => { el.className = 'toast'; }, 2400);
  }

  function navigate(page, id) {
    route.page = page || 'account';
    route.id = id || '';
    location.hash = route.id ? `#/${route.page}/${route.id}` : '#/account';
    render();
  }

  function parseRoute() {
    const parts = (location.hash || '#/account').slice(2).split('/');
    route.page = parts[0] || 'account';
    route.id = parts[1] || '';
  }

  function openModal(html) {
    const isFull = html.trimStart().startsWith('<div class="modal');
    document.getElementById('overlay').innerHTML =
      `<div class="modal-overlay" onclick="SellerApp.closeModal(event)">${isFull ? html : `<div class="modal" onclick="event.stopPropagation()">${html}</div>`}</div>`;
    const modal = document.querySelector('#overlay .modal');
    if (modal) modal.addEventListener('click', (e) => e.stopPropagation());
  }

  function closeOverlay() { document.getElementById('overlay').innerHTML = ''; }

  function renderOrdersPanel() {
    let list = (state.orders || []).slice();
    if (ui.orderWithdrawFilter) list = list.filter((o) => getOrderWithdrawStatus(o) === ui.orderWithdrawFilter);
    if (ui.orderDateFrom) list = list.filter((o) => o.completedAt && o.completedAt.slice(0, 10) >= ui.orderDateFrom);
    if (ui.orderDateTo) list = list.filter((o) => o.completedAt && o.completedAt.slice(0, 10) <= ui.orderDateTo);

    const rows = list.map((o) => {
      const ws = getOrderWithdrawStatus(o);
      return `<tr class="no-click"><td>${S.escapeHtml(o.id)}</td><td>${S.escapeHtml(o.productName)}</td>
        <td>${S.escapeHtml(o.status)}</td><td><span class="badge ${ws === '已提现' ? 'badge-green' : 'badge-gray'}">${ws}</span></td>
        <td>${S.fmtMoney(o.settleAmount)}</td><td>${o.completedAt ? S.fmtDateShort(o.completedAt) : '—'}</td></tr>`;
    }).join('');

    return `<div class="filter-bar">
      <select class="form-select" style="width:140px" data-order-wd-filter>
        <option value="">全部提现状态</option>
        <option value="可提现" ${ui.orderWithdrawFilter === '可提现' ? 'selected' : ''}>可提现</option>
        <option value="待入账" ${ui.orderWithdrawFilter === '待入账' ? 'selected' : ''}>待入账</option>
        <option value="已提现" ${ui.orderWithdrawFilter === '已提现' ? 'selected' : ''}>已提现</option>
      </select>
      <input class="form-input" type="date" style="width:160px" data-order-date-from value="${ui.orderDateFrom}">
      <span style="color:var(--gray-400)">至</span>
      <input class="form-input" type="date" style="width:160px" data-order-date-to value="${ui.orderDateTo}">
      <button class="btn btn-primary btn-sm" data-order-filter>筛选</button>
    </div>
    <div class="list-panel" style="border:none;border-radius:0">
      <table class="data-table">
        <thead><tr><th>订单号</th><th>商品</th><th>订单状态</th><th>提现状态</th><th>结算金额</th><th>完成时间</th></tr></thead>
        <tbody>${rows || '<tr class="no-click"><td colspan="6" class="empty-state">暂无订单</td></tr>'}</tbody>
      </table>
    </div>`;
  }

  function renderWithdrawalsPanel() {
    let list = (state.withdrawals || []).slice();
    if (ui.withdrawStatusFilter) list = list.filter((w) => w.status === ui.withdrawStatusFilter);
    if (ui.withdrawDateFrom) list = list.filter((w) => w.applyTime.slice(0, 10) >= ui.withdrawDateFrom);
    if (ui.withdrawDateTo) list = list.filter((w) => w.applyTime.slice(0, 10) <= ui.withdrawDateTo);

    const rows = list.map((w) => `<tr data-goto-withdraw="${w.id}">
      <td>${S.escapeHtml(w.id)}</td><td>${S.fmtMoney(w.amount)}</td>
      <td><span class="badge ${S.statusBadgeClass(w.status)}">${S.escapeHtml(w.status)}</span></td>
      <td>${S.escapeHtml(w.settlementId)}</td><td>${S.fmtDate(w.applyTime)}</td></tr>`).join('');

    return `<div class="filter-bar">
      <select class="form-select" style="width:140px" data-wd-status-filter>
        <option value="">全部状态</option>
        <option value="待审核" ${ui.withdrawStatusFilter === '待审核' ? 'selected' : ''}>待审核</option>
        <option value="待打款" ${ui.withdrawStatusFilter === '待打款' ? 'selected' : ''}>待打款</option>
        <option value="已完结" ${ui.withdrawStatusFilter === '已完结' ? 'selected' : ''}>已完结</option>
        <option value="已驳回" ${ui.withdrawStatusFilter === '已驳回' ? 'selected' : ''}>已驳回</option>
      </select>
      <input class="form-input" type="date" style="width:160px" data-wd-date-from value="${ui.withdrawDateFrom}">
      <span style="color:var(--gray-400)">至</span>
      <input class="form-input" type="date" style="width:160px" data-wd-date-to value="${ui.withdrawDateTo}">
      <button class="btn btn-primary btn-sm" data-wd-filter>筛选</button>
    </div>
    <div class="list-panel" style="border:none;border-radius:0">
      <table class="data-table">
        <thead><tr><th>提现单号</th><th>申请金额</th><th>状态</th><th>结算单号</th><th>申请时间</th></tr></thead>
        <tbody>${rows || '<tr class="no-click"><td colspan="5" class="empty-state">暂无提现记录</td></tr>'}</tbody>
      </table>
    </div>`;
  }

  function renderOffsetRecordsPanel() {
    const pending = state.account.pendingOffset || 0;
    const list = S.getOffsetRecords(state, {
      type: ui.offsetTypeFilter,
      dateFrom: ui.offsetDateFrom,
      dateTo: ui.offsetDateTo,
    });

    const rows = list.map((r) => {
      const isCreate = r.type === '产生';
      const amountCls = isCreate ? 'style="color:var(--danger);font-weight:600"' : 'style="color:var(--success);font-weight:600"';
      const amountText = isCreate ? `+${S.fmtMoney(r.amount)}` : `-${S.fmtMoney(r.amount)}`;
      const typeBadge = isCreate ? 'badge-red' : 'badge-green';
      return `<tr class="no-click">
        <td>${S.fmtDate(r.createdAt)}</td>
        <td><span class="badge ${typeBadge}">${S.escapeHtml(r.type)}</span></td>
        <td ${amountCls}>${amountText}</td>
        <td>${S.fmtMoney(r.balanceAfter)}</td>
        <td>${S.escapeHtml(r.refType)} · ${S.escapeHtml(r.refId)}</td>
        <td>${S.escapeHtml(r.description)}</td>
      </tr>`;
    }).join('');

    return `<div class="alert alert-info" style="margin:12px 16px 0">
      当前待冲抵余额 <strong style="color:var(--danger)">${S.fmtMoney(pending)}</strong>。
      「产生」= 店铺有责售后退款后计入欠款；「消除」= 提现打款时从提现金额中抵扣并归零。
    </div>
    <div class="filter-bar">
      <select class="form-select" style="width:140px" data-offset-type-filter>
        <option value="">全部类型</option>
        <option value="产生" ${ui.offsetTypeFilter === '产生' ? 'selected' : ''}>产生</option>
        <option value="消除" ${ui.offsetTypeFilter === '消除' ? 'selected' : ''}>消除</option>
      </select>
      <input class="form-input" type="date" style="width:160px" data-offset-date-from value="${ui.offsetDateFrom}">
      <span style="color:var(--gray-400)">至</span>
      <input class="form-input" type="date" style="width:160px" data-offset-date-to value="${ui.offsetDateTo}">
      <button class="btn btn-primary btn-sm" data-offset-filter>筛选</button>
    </div>
    <div class="list-panel" style="border:none;border-radius:0">
      <table class="data-table">
        <thead><tr><th>时间</th><th>类型</th><th>变动金额</th><th>变动后待冲抵</th><th>关联单号</th><th>说明</th></tr></thead>
        <tbody>${rows || '<tr class="no-click"><td colspan="6" class="empty-state">暂无冲抵记录</td></tr>'}</tbody>
      </table>
    </div>`;
  }

  function renderListSection() {
    let panel = renderOrdersPanel();
    if (ui.listTab === 'withdrawals') panel = renderWithdrawalsPanel();
    else if (ui.listTab === 'offsets') panel = renderOffsetRecordsPanel();

    return `<div class="list-wrap">
      <div class="tab-bar">
        <div class="tab-item ${ui.listTab === 'orders' ? 'active' : ''}" data-list-tab="orders">订单明细</div>
        <div class="tab-item ${ui.listTab === 'withdrawals' ? 'active' : ''}" data-list-tab="withdrawals">提现记录</div>
        <div class="tab-item ${ui.listTab === 'offsets' ? 'active' : ''}" data-list-tab="offsets">冲抵记录</div>
      </div>
      ${panel}
    </div>`;
  }

  function renderAccount() {
    const acc = state.account;
    const active = S.getActiveWithdrawal(state);
    const offset = acc.pendingOffset || 0;
    const withdrawable = acc.withdrawable || 0;
    const net = S.getNetWithdrawable(state);
    const canWithdraw = S.canApplyWithdrawal(state).ok;

    const cards = [
      { key: 'pendingCredit', label: '待入账', hint: '待交易完成', debt: false },
      { key: 'withdrawable', label: '可提现', hint: '订单交易完成', debt: false },
      { key: 'withdrawing', label: '提现中', hint: '等待打款', debt: false },
      { key: 'withdrawn', label: '已提现', hint: '提现已到账', debt: false },
      { key: 'pendingOffset', label: '待冲抵', hint: '售后需冲抵金额', debt: true },
    ];

    const statHtml = cards.map((c) => `<div class="${c.debt ? 'stat-card debt' : 'stat-card'}">
      <div class="stat-label">${c.label}</div>
      <div class="${c.debt ? 'stat-value debt' : 'stat-value'}">${S.fmtMoney(acc[c.key])}</div>
      <div class="stat-hint">${c.hint}</div>
    </div>`).join('');

    const offsetAlert = offset > 0 ? `<div class="alert alert-warning">
      <i class="ri-error-warning-line"></i> 待冲抵 ${S.fmtMoney(offset)} 为独立欠款池。提现时「可提现」须先抵扣「待冲抵」，剩余部分方可提现。
      ${withdrawable <= offset ? '<strong>当前可提现金额不足以抵扣待冲抵，暂不可发起提现。</strong>' : ''}
    </div>` : '';

    return `<div class="stat-grid">${statHtml}</div>${offsetAlert}
      <div class="withdraw-cta">
        <div>
          <div style="font-size:12px;color:var(--gray-400)">可提现 ${S.fmtMoney(withdrawable)} · 待冲抵 ${S.fmtMoney(offset)} · 净可提 ${S.fmtMoney(net)}</div>
          <div class="amount">${S.fmtMoney(net)}</div>
          ${active ? `<div style="font-size:12px;color:var(--warning);margin-top:4px">已有进行中提现单 ${active.id}</div>` : ''}
        </div>
        <button class="btn btn-primary" data-apply-withdraw ${canWithdraw ? '' : 'disabled'}>
          <i class="ri-bank-card-line"></i> 申请提现（全额）
        </button>
      </div>${renderListSection()}`;
  }

  function buildWithdrawDetailContent(w) {
    const steps = [
      { label: '提交申请', done: true, time: w.applyTime },
      { label: '平台审批', done: w.status !== '待审核', time: w.auditTime },
      { label: '财务打款', done: w.status === '已完结', time: w.payRegisterTime },
    ];
    const timeline = steps.map((s) => `<div class="timeline-item">
      <div class="timeline-time">${s.time ? S.fmtDate(s.time) : '—'}</div>
      <div class="timeline-desc">${s.label} ${s.done ? '<span class="badge badge-green">已完成</span>' : '<span class="badge badge-gray">待完成</span>'}</div>
    </div>`).join('');

    return `<div class="detail-grid">
      <div class="detail-item"><label>申请金额</label><span style="font-size:18px;font-weight:700">${S.fmtMoney(w.amount)}</span></div>
      <div class="detail-item"><label>状态</label><span class="badge ${S.statusBadgeClass(w.status)}">${S.escapeHtml(w.status)}</span></div>
      <div class="detail-item"><label>关联结算单</label><span>${S.escapeHtml(w.settlementId)}</span></div>
      <div class="detail-item"><label>申请时间</label><span>${S.fmtDate(w.applyTime)}</span></div>
      ${w.auditor ? `<div class="detail-item"><label>审核人</label><span>${S.escapeHtml(w.auditor)}</span></div>` : ''}
      ${w.auditTime ? `<div class="detail-item"><label>审核时间</label><span>${S.fmtDate(w.auditTime)}</span></div>` : ''}
      ${w.payRegisterTime ? `<div class="detail-item"><label>打款时间</label><span>${S.fmtDate(w.payRegisterTime)}</span></div>` : ''}
      ${w.rejectReason ? `<div class="detail-item" style="grid-column:1/-1"><label>驳回原因</label><span style="color:var(--danger)">${S.escapeHtml(w.rejectReason)}</span></div>` : ''}
    </div>
    <div class="section-title">进度时间线</div><div class="timeline">${timeline}</div>`;
  }

  function showWithdrawDetailModal(id) {
    state = S.loadState();
    const w = (state.withdrawals || []).find((x) => x.id === id);
    if (!w) { toast('提现单不存在'); return; }
    openModal(`<div class="modal modal-lg">
      <div class="modal-header"><strong>提现详情 · ${S.escapeHtml(w.id)}</strong><button class="btn-ghost" data-modal-close><i class="ri-close-line"></i></button></div>
      <div class="modal-body">${buildWithdrawDetailContent(w)}</div>
      <div class="modal-footer"><button class="btn btn-secondary" data-modal-close>关闭</button></div>
    </div>`);
    document.querySelectorAll('[data-modal-close]').forEach((el) => el.addEventListener('click', closeOverlay));
  }

  function showWithdrawConfirm() {
    const acc = state.account;
    const amount = acc.withdrawable || 0;
    const offset = acc.pendingOffset || 0;
    const net = S.getNetWithdrawable(state);
    const orders = S.getWithdrawableOrders(state);
    const ba = state.merchant.bankAccount;

    openModal(`<div class="modal-header"><strong>确认申请提现</strong><button class="btn-ghost" onclick="SellerApp.closeModal()"><i class="ri-close-line"></i></button></div>
      <div class="modal-body">
        <div class="alert alert-info">按规则须全额提现。提交后金额从「可提现」转入「提现中」；财务打款后「待冲抵」归零。</div>
        <div class="detail-grid">
          <div class="detail-item"><label>可提现金额</label><span>${S.fmtMoney(amount)}</span></div>
          <div class="detail-item"><label>待冲抵金额</label><span style="color:var(--danger)">${S.fmtMoney(offset)}</span></div>
          <div class="detail-item"><label>净到账金额</label><span style="font-size:20px;font-weight:700;color:#7c3aed">${S.fmtMoney(net)}</span></div>
          <div class="detail-item"><label>纳入订单</label><span>${orders.length} 笔</span></div>
          <div class="detail-item"><label>收款账户</label><span>${S.escapeHtml(ba.account)}</span></div>
          <div class="detail-item"><label>开户行</label><span>${S.escapeHtml(ba.bank)}</span></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="SellerApp.closeModal()">取消</button>
        <button class="btn btn-primary" data-confirm-withdraw>确认提交</button>
      </div>`);
    document.querySelector('[data-confirm-withdraw]').addEventListener('click', () => {
      const r = S.applyWithdrawal(state);
      closeOverlay();
      if (r.ok) { toast('提现申请已提交'); ui.listTab = 'withdrawals'; render(); showWithdrawDetailModal(r.withdrawalId); }
      else toast(r.msg);
    });
  }

  function renderShell(content) {
    const pendingAudit = (state.withdrawals || []).filter((w) => w.status === '待审核').length;
    document.getElementById('app-root').innerHTML = `
      <div class="seller-single">
        <header class="app-header">
          <span class="app-header-title"><i class="ri-store-2-line"></i> ${S.escapeHtml(state.merchant.name)}</span>
          <div class="app-header-actions">
            <a href="bm-platform.html" target="_blank" class="btn btn-ghost btn-sm"><i class="ri-external-link-line"></i> 打开平台端</a>
            ${pendingAudit ? `<span class="badge badge-orange">${pendingAudit} 笔待审核</span>` : ''}
            <button class="btn btn-secondary btn-sm" data-reset-demo><i class="ri-refresh-line"></i> 恢复演示数据</button>
          </div>
        </header>
        <div class="app-content">${content}</div>
      </div>`;
  }

  function bindEvents() {
    document.querySelectorAll('[data-list-tab]').forEach((el) => el.addEventListener('click', () => {
      ui.listTab = el.dataset.listTab; route.id = ''; location.hash = '#/account'; render();
    }));
    document.querySelectorAll('[data-goto-withdraw]').forEach((el) => el.addEventListener('click', () => showWithdrawDetailModal(el.dataset.gotoWithdraw)));
    document.querySelector('[data-order-filter]')?.addEventListener('click', () => {
      ui.orderWithdrawFilter = document.querySelector('[data-order-wd-filter]')?.value || '';
      ui.orderDateFrom = document.querySelector('[data-order-date-from]')?.value || '';
      ui.orderDateTo = document.querySelector('[data-order-date-to]')?.value || '';
      render();
    });
    document.querySelector('[data-wd-filter]')?.addEventListener('click', () => {
      ui.withdrawStatusFilter = document.querySelector('[data-wd-status-filter]')?.value || '';
      ui.withdrawDateFrom = document.querySelector('[data-wd-date-from]')?.value || '';
      ui.withdrawDateTo = document.querySelector('[data-wd-date-to]')?.value || '';
      render();
    });
    document.querySelector('[data-offset-filter]')?.addEventListener('click', () => {
      ui.offsetTypeFilter = document.querySelector('[data-offset-type-filter]')?.value || '';
      ui.offsetDateFrom = document.querySelector('[data-offset-date-from]')?.value || '';
      ui.offsetDateTo = document.querySelector('[data-offset-date-to]')?.value || '';
      render();
    });
    document.querySelector('[data-apply-withdraw]')?.addEventListener('click', showWithdrawConfirm);
    document.querySelector('[data-reset-demo]')?.addEventListener('click', () => {
      state = S.resetDemo(); toast('已恢复演示数据'); render();
    });
  }

  function render() {
    state = S.loadState();
    renderShell(renderAccount());
    bindEvents();
  }

  window.SellerApp = { closeModal(e) { if (!e || e.target.classList.contains('modal-overlay')) closeOverlay(); }, navigate, render };

  function openWithdrawFromHash() {
    if (!route.id) return;
    const id = route.id;
    ui.listTab = 'withdrawals';
    route.id = '';
    location.replace('#/account');
    render();
    showWithdrawDetailModal(id);
  }

  window.addEventListener('hashchange', () => { parseRoute(); if (route.id) openWithdrawFromHash(); else render(); });
  parseRoute();
  if (route.id) openWithdrawFromHash(); else render();
})();

  </script>
</body>
</html>
