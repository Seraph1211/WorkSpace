      });
    },

    verifyAftersaleFunds(state, aftersaleIds, opts = {}) {
      const ids = aftersaleIds || [];
      if (!ids.length) return { ok: false, msg: '请选择待核销记录' };
      const operator = opts.operator || '财务专员';
      const note = (opts.note || '').trim();
      const vouchers = (opts.vouchers || []).slice();
      const t = nowISO();
      let total = 0;
      let count = 0;
      ids.forEach((aid) => {
        const fund = (state.aftersaleFunds || []).find((f) => f.aftersaleId === aid);
        if (!fund || fund.offsetStatus !== OFFSET_STATUS.PENDING) return;
        fund.offsetStatus = OFFSET_STATUS.VERIFIED;
        fund.clearedAt = t;
        fund.clearedBy = operator;
        fund.verifyNote = note;
        fund.verifyVouchers = vouchers;
        const amt = fund.shopPayable || 0;
        total += amt;
        count += 1;
        state.account.pendingOffset = Math.max(0, (state.account.pendingOffset || 0) - amt);
        const desc = note
          ? `财务核销待冲抵，店铺线下转账已核实到账（${note}）`
          : '财务核销待冲抵，店铺线下转账已核实到账';
        this.addOffsetRecord(state, {
          type: '消除',
          amount: amt,
          balanceAfter: state.account.pendingOffset,
          refId: fund.aftersaleId,
          refType: '售后单',
          description: desc,
          createdAt: t,
        });
      });
      if (!count) return { ok: false, msg: '所选记录均不可核销' };
      const logNote = note ? `，备注：${note}` : '';
      this.addLog(state, '核销待冲抵', `核销 ${count} 笔售后资金，合计 ${fmtMoney(total)}${logNote}`);
      this.saveState(state);
      return { ok: true, count, amount: total };
    },

    applyWithdrawal(state) {
      const check = this.canApplyWithdrawal(state);
      if (!check.ok) return check;
      const amount = state.account.withdrawable || 0;
      const orders = this.getWithdrawableOrders(state);
      const offset = state.account.pendingOffset || 0;
      const related = this.getRelatedOffsetAftersales(state).map((a) => a.id);
      const wId = this.nextId(state, 'withdrawal', 'WD');
      const sId = this.nextId(state, 'settlement', 'STL');
      const t = nowISO();
      const ba = state.merchant.bankAccount;

      state.withdrawals.unshift({
        id: wId, shopId: state.merchant.id, shopName: state.merchant.name, shopType: state.merchant.type,
        applyTime: t, amount, status: WITHDRAWAL_STATUS.PENDING_AUDIT, settlementId: sId,
        pendingOffsetAmount: offset, relatedAftersales: related,
        auditor: '', auditTime: '', rejectReason: '', payRegisterTime: '', note: '',
      });
      state.settlements.unshift({
        id: sId, settleType: SETTLE_TYPE.WITHDRAW, bizRefId: wId,
        shopId: state.merchant.id, shopName: state.merchant.name, shopType: state.merchant.type,
        payeeName: ba.name, payeeAccount: ba.account, payeeBank: ba.bank, payeePurpose: ba.purpose || '提现款',
        createdAt: t, totalAmount: amount, orderCount: orders.length,
        userPaidTotal: orders.reduce((s, o) => s + o.userPaid, 0),
        feeTotal: orders.reduce((s, o) => s + o.platformFee, 0),
        compTotal: orders.reduce((s, o) => s + o.compensation, 0),
        status: SETTLEMENT_STATUS.PENDING_PAY,
        orders: orders.map((o, i) => ({
          seq: i + 1, orderId: o.id, productName: o.productName, shopName: o.shopName || state.merchant.name,
          userPaid: o.userPaid, platformFee: o.platformFee, paymentFee: o.paymentFee || 0, compensation: o.compensation, settleAmount: o.settleAmount,
        })),
        aftersaleItems: [], payment: null,
      });
      state.account.withdrawing = (state.account.withdrawing || 0) + amount;
      state.account.withdrawable = 0;
      this.addLog(state, '申请提现', `${wId} 申请提现 ${fmtMoney(amount)}，待冲抵 ${fmtMoney(offset)}`);
      this.saveState(state);
      return { ok: true, withdrawalId: wId };
    },

    approveWithdrawal(state, withdrawalId, opinion) {
      const w = (state.withdrawals || []).find((x) => x.id === withdrawalId);
      if (!w || w.status !== WITHDRAWAL_STATUS.PENDING_AUDIT) return { ok: false, msg: '状态不允许审批' };
      w.status = WITHDRAWAL_STATUS.PENDING_PAY;
      w.auditor = '运营审核员';
      w.auditTime = nowISO();
      if (opinion?.trim()) w.note = opinion.trim();
      this.addLog(state, '提现审批', `${w.id} 审批通过`);
      this.saveState(state);
      return { ok: true };
    },

    rejectWithdrawal(state, withdrawalId, reason) {
      const w = (state.withdrawals || []).find((x) => x.id === withdrawalId);
      if (!w || w.status !== WITHDRAWAL_STATUS.PENDING_AUDIT) return { ok: false, msg: '状态不允许驳回' };
      if (!reason?.trim()) return { ok: false, msg: '请填写驳回原因' };
      const s = this.getSettlementByBizRef(state, w.id);
      w.status = WITHDRAWAL_STATUS.REJECTED;
      w.rejectReason = reason.trim();
      w.auditor = '运营审核员';
      w.auditTime = nowISO();
      if (s) s.status = SETTLEMENT_STATUS.VOID;
      state.account.withdrawable = (state.account.withdrawable || 0) + w.amount;
      state.account.withdrawing = Math.max(0, (state.account.withdrawing || 0) - w.amount);
      this.addLog(state, '提现驳回', `${w.id} 已驳回`);
      this.saveState(state);
      return { ok: true };
    },

    registerSettlementPayment(state, settlementId, payment) {
      const s = (state.settlements || []).find((x) => x.id === settlementId);
      if (!s) return { ok: false, msg: '结算单不存在' };
      if (s.status !== SETTLEMENT_STATUS.PENDING_PAY) return { ok: false, msg: '该结算单不可打款' };
      const t = nowISO();
      s.status = SETTLEMENT_STATUS.PAID;
      s.payment = {
        registerTime: t,
        note: payment.note || '',
        vouchers: (payment.vouchers || []).slice(),
      };

      if (s.settleType === SETTLE_TYPE.WITHDRAW) {
        const w = (state.withdrawals || []).find((x) => x.id === s.bizRefId);
        if (w) {
          w.status = WITHDRAWAL_STATUS.COMPLETED;
          w.payRegisterTime = t;
          state.account.withdrawn = (state.account.withdrawn || 0) + w.amount;
          state.account.withdrawing = Math.max(0, (state.account.withdrawing || 0) - w.amount);
          const offsetAmt = w.pendingOffsetAmount || 0;
          state.account.pendingOffset = 0;
          if (offsetAmt > 0) {
            this.markAftersaleFundsClearedOnWithdraw(state, w, t);
            this.addOffsetRecord(state, {
              type: '消除',
              amount: offsetAmt,
              balanceAfter: 0,
              refId: w.id,
              refType: '提现单',
              description: `提现打款完成，待冲抵 ${fmtMoney(offsetAmt)} 从提现金额中抵扣并归零`,
              createdAt: t,
            });
          }
        }
        (s.orders || []).forEach((o) => {
          const order = (state.orders || []).find((x) => x.id === o.orderId);
          if (order) order.accountStatus = '已提现';
        });
        this.addLog(state, '提现打款', `结算单 ${s.id} 已打款，店铺待冲抵归零`);
      } else if (s.settleType === SETTLE_TYPE.REFUND) {
        const a = (state.aftersales || []).find((x) => x.id === s.bizRefId);
        if (a) a.status = AFTERSALE_STATUS.COMPLETED;
        this.addLog(state, '售后打款', `结算单 ${s.id} 已打款，售后单 ${s.bizRefId} 已完结`);
      }
      this.saveState(state);
      return { ok: true };
    },

    batchMarkPaid(state, settlementIds, payment) {
      const ids = settlementIds || [];
      if (!ids.length) return { ok: false, msg: '请选择结算单' };
      const payload = typeof payment === 'string'
        ? { note: payment || '批量标记打款', vouchers: [] }
        : { note: payment?.note || '批量标记打款', vouchers: payment?.vouchers || [] };
      ids.forEach((id) => this.registerSettlementPayment(state, id, payload));
      return { ok: true, count: ids.length };
    },

    acceptAftersale(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PENDING) return { ok: false, msg: '状态不允许受理' };
      a.status = AFTERSALE_STATUS.PROCESSING;
      a.handler = a.handler || '客服专员';
      a.acceptedAt = nowISO();
      this.saveState(state);
      return { ok: true };
    },

    updateAftersaleFields(state, id, fields) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a) return { ok: false, msg: '售后单不存在' };
      if (a.status === AFTERSALE_STATUS.COMPLETED || a.status === AFTERSALE_STATUS.REJECTED || a.status === AFTERSALE_STATUS.REFUNDING) {
        return { ok: false, msg: '当前状态不可编辑' };
      }
      const needRefund = fields.needRefund ?? a.needRefund ?? '';
      const refund = Number(fields.refundAmount) || 0;
      const shop = Number(fields.shopPayable) || 0;
      const platform = Number(fields.platformPayable) || 0;
      if (needRefund === '是' && refund > 0 && Math.abs(refund - shop - platform) > 0.01) {
        return { ok: false, msg: '退款金额须等于店铺应付 + 平台应付' };
      }
      const patch = {
        aftersaleType: fields.aftersaleType ?? a.aftersaleType,
        needRefund,
        note: fields.note ?? a.note,
      };
      if (needRefund === '是') {
        Object.assign(patch, {
          liabilityParty: fields.liabilityParty ?? a.liabilityParty,
          refundAmount: refund,
          shopPayable: shop,
          platformPayable: platform,
          payeeName: fields.payeeName ?? a.payeeName,
          payeeAccount: fields.payeeAccount ?? a.payeeAccount,
          payeeBank: fields.payeeBank ?? a.payeeBank,
          payeePurpose: fields.payeePurpose ?? a.payeePurpose,
        });
      } else if (needRefund === '否') {
        Object.assign(patch, {
          liabilityParty: '',
          refundAmount: 0, shopPayable: 0, platformPayable: 0,
          payeeName: '', payeeAccount: '', payeeBank: '', payeePurpose: '',
        });
      }
      Object.assign(a, patch);
      this.saveState(state);
      return { ok: true };
    },

    rejectAftersale(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PROCESSING) return { ok: false, msg: '状态不允许拒绝' };
      a.status = AFTERSALE_STATUS.REJECTED;
      this.saveState(state);
      return { ok: true };
    },

    completeAftersaleNoRefund(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PROCESSING) return { ok: false, msg: '状态不允许完结' };
      if (a.needRefund !== '否') return { ok: false, msg: '请选择「是否需要退款」为否' };
      a.status = AFTERSALE_STATUS.COMPLETED;
      this.saveState(state);
      return { ok: true };
    },

    confirmRefund(state, id) {
      const a = (state.aftersales || []).find((x) => x.id === id);
      if (!a || a.status !== AFTERSALE_STATUS.PROCESSING) return { ok: false, msg: '仅处理中状态可确认退款' };
      if (a.needRefund !== '是') return { ok: false, msg: '请选择「是否需要退款」为是' };
      if (!a.refundAmount || a.refundAmount <= 0) return { ok: false, msg: '请填写退款金额' };
      if (!a.payeeName || !a.payeeAccount) return { ok: false, msg: '请填写买家收款信息' };
      const sId = this.nextId(state, 'settlement', 'STL');
      const t = nowISO();
      state.settlements.unshift({
        id: sId, settleType: SETTLE_TYPE.REFUND, bizRefId: a.id,
        shopId: state.merchant.id, shopName: state.merchant.name, shopType: '店铺',
        payeeName: a.payeeName, payeeAccount: a.payeeAccount, payeeBank: a.payeeBank || '支付宝', payeePurpose: a.payeePurpose || '售后退款',
        createdAt: t, totalAmount: a.refundAmount, orderCount: 0,
        userPaidTotal: 0, feeTotal: 0, compTotal: 0, status: SETTLEMENT_STATUS.PENDING_PAY,
        orders: [],
        aftersaleItems: [{
          aftersaleId: a.id, productName: a.productName, shopName: state.merchant.name,
          refundAmount: a.refundAmount, platformPayable: a.platformPayable, shopPayable: a.shopPayable, paymentFee: 0,
        }],
        payment: null,
      });
      a.status = AFTERSALE_STATUS.REFUNDING;
      a.settlementId = sId;
      if (a.liabilityParty === '店铺有责' && (a.shopPayable || 0) > 0) {
        state.account.pendingOffset = (state.account.pendingOffset || 0) + a.shopPayable;
        this.addOffsetRecord(state, {
          type: '产生',
          amount: a.shopPayable,
          refId: a.id,
          refType: '售后单',
          description: `店铺有责售后退款，店铺应付 ${fmtMoney(a.shopPayable)} 计入待冲抵`,
          createdAt: t,
        });
        this.upsertAftersaleFund(state, a, t);
      }
      this.addLog(state, '确认退款', `${a.id} 创建结算单 ${sId}，进入退款中`);
      this.saveState(state);
      return { ok: true, settlementId: sId };
    },

    getReportShopOptions(state) {
      const names = new Set();
      (state.orders || []).forEach((o) => names.add(o.shopName || state.merchant?.name || '—'));
      return [...names].sort();
    },

    getFinancialReport(state, filters = {}) {
      const start = filters.startDate || '2026-05-01';
      const end = filters.endDate || '2026-05-31';
      const shop = filters.shopName || '';
      return (state.orders || []).filter((o) => {
        if (o.status !== '交易完成' || !o.completedAt) return false;
        const d = o.completedAt.slice(0, 10);
        if (d < start || d > end) return false;
        if (shop && (o.shopName || state.merchant?.name) !== shop) return false;
        return true;
      });
    },

    exportFinancialReportCsv(state, filters) {
      const rows = this.getFinancialReport(state, filters);
      const header = ['订单号', '店铺名称', '商品', '用户实付', '店铺应结算', '平台服务费', '支付服务费', '履约扣除'];
      const lines = ['\uFEFF' + header.join(',')];
      rows.forEach((o) => {
        lines.push([o.id, o.shopName || state.merchant.name, o.productName, o.userPaid, o.shopSettle ?? o.settleAmount, o.platformFee, o.paymentFee || 0, o.compensation].join(','));
      });
      return lines.join('\n');
    },

    exportBatchTransferCsv(state, settlementIds) {
      const header = ['收款方名称', '收款方账号', '收款方开户行', '金额', '附言/用途', '结算单号', '关联业务单号'];
      const lines = ['\uFEFF' + header.join(',')];
      (settlementIds || []).forEach((id) => {
        const s = (state.settlements || []).find((x) => x.id === id);
        if (s && s.status === SETTLEMENT_STATUS.PENDING_PAY) {
          lines.push([s.payeeName, s.payeeAccount, s.payeeBank || '', s.totalAmount, s.payeePurpose || '', s.id, s.bizRefId].join(','));
        }
      });
      return lines.join('\n');
    },

    exportSettlementCsv(state, settlementId) {
      const s = (state.settlements || []).find((x) => x.id === settlementId);
      if (!s) return '';
      const lines = ['\uFEFF结算单导出'];
      lines.push(`结算单号,${s.id}`);
      lines.push(`结算类型,${s.settleType}`);
      lines.push(`关联业务单号,${s.bizRefId}`);
      lines.push(`结算金额,${s.totalAmount}`);
      lines.push(`收款方,${s.payeeName},${s.payeeAccount},${s.payeeBank}`);
      if (s.settleType === SETTLE_TYPE.WITHDRAW) {
        lines.push('', '订单明细', '序号,订单号,商品,用户实付,平台服务费,支付服务费,履约包赔,应结金额');
        (s.orders || []).forEach((o) => lines.push([o.seq, o.orderId, o.productName, o.userPaid, o.platformFee, o.paymentFee || 0, o.compensation, o.settleAmount].join(',')));
      } else {
        lines.push('', '售后明细', '售后单号,商品,退款金额,平台应付,店铺应付');
        (s.aftersaleItems || []).forEach((o) => lines.push([o.aftersaleId, o.productName, o.refundAmount, o.platformPayable, o.shopPayable].join(',')));
      }
      return lines.join('\n');
    },

    statusBadgeClass(status) {
      const map = {
        '待审核': 'badge-orange', '待打款': 'badge-blue', '已驳回': 'badge-red', '已完结': 'badge-green',
        '待处理': 'badge-orange', '处理中': 'badge-blue', '退款中': 'badge-blue', '已拒绝': 'badge-gray',
        '已作废': 'badge-gray', '已打款': 'badge-green',
        '待冲抵': 'badge-orange', '已冲抵': 'badge-green', '已核销': 'badge-blue',
      };
      return map[status] || 'badge-gray';
    },
  };

  global.BMStore = BMStore;
})(typeof window !== 'undefined' ? window : global);

  </script>
  <script>
/**
 * 平台端可交互原型 (V5)
 */
(function () {
  const S = BMStore;
  let state = S.loadState();
  let route = { page: 'aftersales', id: '' };
  let ui = {
    aftersaleTab: '',
    withdrawTab: 'pending',
    settlementTab: 'pending',
    reportDateStart: '2026-05-01',
    reportDateEnd: '2026-05-31',
    reportShop: '',
    selectedSettlements: [],
    asFundTab: 'all',
    asFundShop: '',
    asFundAftersaleId: '',
    selectedAsFunds: [],
  };

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show';
    setTimeout(() => { el.className = 'toast'; }, 2400);
  }

  function navigate(page) {
    route.page = page;
    location.hash = `#/${page}`;
    render();
  }

  function parseRoute() {
    const parts = (location.hash || '#/aftersales').slice(2).split('/');
    route.page = parts[0] || 'aftersales';
  }

  function openModal(html) {
    document.getElementById('overlay').innerHTML =
      `<div class="modal-overlay" onclick="PlatformApp.closeModal(event)">${html}</div>`;
    const modal = document.querySelector('#overlay .modal');
    if (modal) modal.addEventListener('click', (e) => e.stopPropagation());
  }

  function bindModalClose() {
    document.querySelectorAll('[data-modal-close]').forEach((el) => el.addEventListener('click', closeOverlay));
  }

  function closeOverlay() { document.getElementById('overlay').innerHTML = ''; }

  function getDurationHtml(a) {
    const days = S.getProcessingDurationDays(a);
    if (!a.acceptedAt) return '—';
    const cls = days >= 5 ? 'duration-warn' : '';
    return `<span class="${cls}">${days} 天</span>`;
  }

  function buildAftersaleProcessBody(a) {
    const frozen = ['已完结', '已拒绝', '退款中'].includes(a.status);
    const types = ['账号人脸', '账号找回', '账号冻结', '未成年退款', '其他'];
    const typeOpts = types.map((t) => `<option value="${t}" ${a.aftersaleType === t ? 'selected' : ''}>${t}</option>`).join('');
    const liabilityOpts = ['', '店铺有责', '店铺无责'].map((t) =>
      `<option value="${t}" ${a.liabilityParty === t ? 'selected' : ''}>${t || '请选择'}</option>`).join('');
    const needRefundOpts = ['', '是', '否'].map((t) =>
      `<option value="${t}" ${a.needRefund === t ? 'selected' : ''}>${t || '请选择'}</option>`).join('');
    const showRefund = a.needRefund === '是';

    return `<div class="as-info-stack">
      <div class="as-info-box">
        <div class="as-info-title">订单信息（只读）</div>
        <div class="as-info-grid">
          <div class="detail-item"><label>订单号</label><span>${S.escapeHtml(a.orderId)}</span></div>
          <div class="detail-item"><label>商品</label><span>${S.escapeHtml(a.productName)}</span></div>
          <div class="detail-item"><label>订单实付</label><span>${S.fmtMoney(a.orderPaid)}</span></div>
          <div class="detail-item"><label>支付时间</label><span>${S.fmtDateShort(a.orderPaidAt)}</span></div>
        </div>
      </div>
      <div class="as-info-box">
        <div class="as-info-title">售后信息（只读）</div>
        <div class="as-info-grid">
          <div class="detail-item"><label>申请人</label><span>${S.escapeHtml(a.applicant || '—')}</span></div>
          <div class="detail-item"><label>申请时间</label><span>${S.fmtDate(a.createdAt)}</span></div>
          <div class="detail-item"><label>用户申请原因</label><span>${S.escapeHtml(a.userReason || '—')}</span></div>
          <div class="detail-item"><label>售后凭证</label><span>${S.escapeHtml(a.userEvidence || '—')}</span></div>
          <div class="detail-item"><label>受理客服</label><span>${S.escapeHtml(a.handler || '—')}</span></div>
          <div class="detail-item"><label>处理时长</label><span>${getDurationHtml(a)}</span></div>
        </div>
      </div>
    </div>
    <div class="as-divider"></div>
    <div class="as-form-grid">
      <div class="form-group"><label class="form-label">售后类型</label>
        <select class="form-select" id="as-type-${a.id}" ${frozen ? 'disabled' : ''}>${typeOpts}</select></div>
      <div class="form-group"><label class="form-label">是否需要退款</label>
        <select class="form-select" id="as-need-refund-${a.id}" ${frozen ? 'disabled' : ''}>${needRefundOpts}</select></div>
    </div>
    <div id="as-refund-section-${a.id}" class="as-refund-section" style="display:${showRefund ? 'block' : 'none'}">
      <div class="as-form-grid">
        <div class="form-group"><label class="form-label">责任方</label>
          <select class="form-select" id="as-liability-${a.id}" ${frozen ? 'disabled' : ''}>${liabilityOpts}</select></div>
        <div class="form-group"><label class="form-label">退款金额</label>
          <input class="form-input" type="number" id="as-refund-${a.id}" value="${a.refundAmount || 0}" ${frozen ? 'disabled' : ''}></div>
        <div class="form-group"><label class="form-label">平台应付</label>

  function getAftersaleFields(id) {
    const needRefund = document.getElementById(`as-need-refund-${id}`)?.value ?? '';
    const fields = {
      aftersaleType: document.getElementById(`as-type-${id}`)?.value,
      needRefund,
      note: document.getElementById(`as-note-${id}`)?.value,
    };
    if (needRefund === '是') {
      Object.assign(fields, {
        liabilityParty: document.getElementById(`as-liability-${id}`)?.value,
        refundAmount: document.getElementById(`as-refund-${id}`)?.value,
        platformPayable: document.getElementById(`as-platform-${id}`)?.value,
        shopPayable: document.getElementById(`as-shop-${id}`)?.value,
        payeeName: document.getElementById(`as-payee-name-${id}`)?.value,
        payeeAccount: document.getElementById(`as-payee-acct-${id}`)?.value,
        payeeBank: document.getElementById(`as-payee-bank-${id}`)?.value,
        payeePurpose: document.getElementById(`as-payee-purpose-${id}`)?.value,
      });
    }
    return fields;
  }

  function updateAftersalePrimaryBtn(id) {
    const sel = document.getElementById(`as-need-refund-${id}`);
    const btn = document.querySelector(`[data-as-primary="${id}"]`);
    if (!btn || !sel) return;
    const v = sel.value;
    if (v === '是') {
      btn.textContent = '确认退款';
      btn.disabled = false;
    } else if (v === '否') {
      btn.textContent = '确认关单';
      btn.disabled = false;
    } else {
      btn.textContent = '确认';
      btn.disabled = true;
    }
  }

    const sel = document.getElementById(`as-need-refund-${id}`);
    const section = document.getElementById(`as-refund-section-${id}`);
    if (!sel || !section) return;
    sel.addEventListener('change', () => {
      section.style.display = sel.value === '是' ? 'block' : 'none';
      updateAftersalePrimaryBtn(id);
    });

  function showProcessAftersaleModal(id) {
    state = S.loadState();
    const a = (state.aftersales || []).find((x) => x.id === id);
    if (!a) { toast('售后单不存在'); return; }
    const canAct = a.status === '处理中';
    const acceptBtn = a.status === '待处理' ? `<button class="btn btn-secondary" data-accept-as="${id}">受理</button>` : '';
    const rejectBtn = canAct ? `<button class="btn btn-danger" data-reject-as="${id}">拒绝售后</button>` : '';
    const primaryBtn = canAct ? `<button class="btn btn-primary" data-as-primary="${id}">确认</button>` : '';

    openModal(`<div class="modal modal-lg">
      <div class="modal-header">
        <div class="as-modal-head"><strong>处理售后 · ${S.escapeHtml(a.id)}</strong>
          <span class="badge ${S.statusBadgeClass(a.status)}" style="margin-left:8px">${S.escapeHtml(a.status)}</span></div>
        <button class="btn-ghost" data-modal-close><i class="ri-close-line"></i></button>
      </div>
      <div class="modal-body">${buildAftersaleProcessBody(a)}</div>
      <div class="modal-footer modal-footer-between">
        <div style="display:flex;gap:8px">${acceptBtn}${rejectBtn}</div>
        <div class="modal-footer-actions">${primaryBtn}<button class="btn btn-secondary" data-modal-close>关闭</button></div>
      </div>
    </div>`);
    bindModalClose();
    bindAftersaleRefundToggle(id);
    document.querySelector(`[data-accept-as="${id}"]`)?.addEventListener('click', () => {
      const r = S.acceptAftersale(state, id);
      if (r.ok) { closeOverlay(); toast('已受理'); render(); showProcessAftersaleModal(id); } else toast(r.msg);
    });
    document.querySelector(`[data-reject-as="${id}"]`)?.addEventListener('click', () => {
      S.updateAftersaleFields(state, id, getAftersaleFields(id));
      const r = S.rejectAftersale(state, id);
      if (r.ok) { closeOverlay(); toast('已拒绝'); render(); } else toast(r.msg);
    });
    document.querySelector(`[data-as-primary="${id}"]`)?.addEventListener('click', () => {
      const needRefund = document.getElementById(`as-need-refund-${id}`)?.value;
      const res = S.updateAftersaleFields(state, id, getAftersaleFields(id));
      if (!res.ok) { toast(res.msg); return; }
      if (needRefund === '否') {
        const r = S.completeAftersaleNoRefund(state, id);
        if (r.ok) { closeOverlay(); toast('售后已完结'); render(); } else toast(r.msg);
      } else if (needRefund === '是') {
        const r = S.confirmRefund(state, id);
        if (r.ok) { closeOverlay(); toast(`已创建结算单 ${r.settlementId}，进入退款中`); render(); } else toast(r.msg);
      } else {
        toast('请先选择是否需要退款');
      }
    });
  }

  function downloadCsv(content, filename) {

    const a = document.createElement('a');

    a.download = filename;
    a.click();
    toast('已导出');
  }

        <label class="pay-voucher-add">

        </label>

  function bindVoucherUpload(inputId, listId) {
    const input = document.getElementById(inputId);
    const list = document.getElementById(listId);
    const vouchers = [];
    if (!input || !list) return () => [];

    function renderList() {
      list.innerHTML = vouchers.map((src, i) => `<div class="pay-voucher-item">
        <img class="pay-voucher-thumb" src="${src}" alt="打款凭证">
        <button type="button" class="pay-voucher-remove" data-voucher-rm="${i}">×</button>
      </div>`).join('');
      list.querySelectorAll('[data-voucher-rm]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          vouchers.splice(Number(btn.dataset.voucherRm), 1);
          renderList();
        });
      });
    }

    input.addEventListener('change', () => {
      [...input.files].forEach((file) => {
        const reader = new FileReader();
        reader.onload = () => { vouchers.push(reader.result); renderList(); };
        reader.readAsDataURL(file);
      });
      input.value = '';
    });

    return () => vouchers.slice();
  }

    if (ui.settlementTab === 'void') return list.filter((s) => s.status === '已作废');
    return list;
  }

    const collectVouchers = bindVoucherUpload('pay-voucher-input', 'pay-voucher-list');
    document.querySelector(`[data-confirm-stl="${stlId}"]`)?.addEventListener('click', () => {
      const r = S.registerSettlementPayment(state, stlId, {
        note: document.getElementById('pay-note')?.value || '',
        vouchers: collectVouchers(),
      });
      closeOverlay();
      if (r.ok) { toast('打款登记完成'); render(); } else toast(r.msg);
    });
  }

  function showBatchPaidModal() {
    const ids = ui.selectedSettlements.slice();
    openModal(`<div class="modal">
      <div class="modal-header"><strong>批量标记已打款（${ids.length} 笔）</strong><button class="btn-ghost" data-modal-close><i class="ri-close-line"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">打款备注</label>
          <input class="form-input" id="batch-note" value="批量标记打款"></div>
        ${buildVoucherUploadHtml('batch-voucher-input', 'batch-voucher-list')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal-close>取消</button>
        <button class="btn btn-primary" data-confirm-batch>确认</button>
      </div>
    </div>`);
    bindModalClose();
    const collectVouchers = bindVoucherUpload('batch-voucher-input', 'batch-voucher-list');
    document.querySelector('[data-confirm-batch]')?.addEventListener('click', () => {
      const r = S.batchMarkPaid(state, ids, {
        note: document.getElementById('batch-note')?.value || '',
        vouchers: collectVouchers(),
      });
      ui.selectedSettlements = [];
      closeOverlay();
      if (r.ok) { toast(`已标记 ${r.count} 笔结算单`); render(); } else toast(r.msg);
    });
  }

  function renderAftersaleFunds() {
    const all = state.aftersaleFunds || [];
    const pending = all.filter((f) => f.offsetStatus === '待冲抵');
    const cleared = all.filter((f) => f.offsetStatus === '已冲抵');
    const verified = all.filter((f) => f.offsetStatus === '已核销');
    const fundFilters = { shopName: ui.asFundShop, aftersaleId: ui.asFundAftersaleId };
    const list = S.getAftersaleFunds(state, ui.asFundTab === 'all' ? '' : ui.asFundTab, fundFilters);
    const pendingTotal = pending.reduce((s, f) => s + (f.shopPayable || 0), 0);
    const shopOpts = S.getAftersaleFundShopOptions(state).map((name) =>
      `<option value="${S.escapeHtml(name)}" ${ui.asFundShop === name ? 'selected' : ''}>${S.escapeHtml(name)}</option>`).join('');

    const rows = list.map((f) => {
      const isPending = f.offsetStatus === '待冲抵';
      const checked = ui.selectedAsFunds.includes(f.aftersaleId) ? 'checked' : '';
      const chk = isPending ? `<input type="checkbox" class="asf-chk" data-asf-chk="${f.aftersaleId}" ${checked}>` : '';
      const verifyBtn = isPending
        ? `<button class="btn btn-primary btn-sm" data-verify-asf="${f.aftersaleId}">核销待冲抵</button>` : '';
      const clearedInfo = f.clearedAt
        ? `<div style="font-size:11px;color:var(--gray-400);margin-top:2px">${S.escapeHtml(f.clearedBy)} · ${S.fmtDate(f.clearedAt)}${f.verifyNote ? `<br>备注：${S.escapeHtml(f.verifyNote)}` : ''}</div>` : '';
      return `<tr class="action-row no-click">
        <td>${chk}</td>
        <td>${S.escapeHtml(f.aftersaleId)}</td>
        <td>${S.escapeHtml(f.orderId)}</td>
        <td>${S.escapeHtml(f.shopName)}</td>
        <td>${S.fmtMoney(f.refundAmount)}</td>
        <td>${S.fmtMoney(f.platformPayable)}</td>
        <td>${S.fmtMoney(f.shopPayable)}</td>
        <td><span class="badge ${S.statusBadgeClass(f.offsetStatus)}">${S.escapeHtml(f.offsetStatus)}</span>${clearedInfo}</td>
        <td><div class="action-btns">${verifyBtn}</div></td>
      </tr>`;
    }).join('');

    const tabs = [
      { key: 'all', label: `全部（${all.length}）` },
      { key: 'pending', label: `待冲抵（${pending.length}）` },
      { key: 'cleared', label: `已冲抵（${cleared.length}）` },
      { key: 'verified', label: `已核销（${verified.length}）` },
    ];

    return `<div class="page-toolbar"><h2 class="page-title">售后资金</h2></div>
      <div class="alert alert-info">
        店铺有责售后退款后，店铺承担金额计入「待冲抵」。除提现时自动冲抵外，店铺可线下转账给平台，财务核实后在此核销。
        当前待冲抵合计 <strong style="color:var(--danger)">${S.fmtMoney(pendingTotal)}</strong>（${pending.length} 笔）。
      </div>
      <div class="list-wrap">
        <div class="tab-bar">
          ${tabs.map((t) => `<div class="tab-item ${ui.asFundTab === t.key ? 'active' : ''}" data-asf-tab="${t.key}">${t.label}</div>`).join('')}
        </div>
        <div class="filter-bar" style="padding:12px 16px 0">
          <label>店铺</label>
          <select class="form-select" style="width:180px" data-asf-shop-filter>
            <option value="">全部店铺</option>${shopOpts}
          </select>
          <label>售后单号</label>
          <input class="form-input" style="width:200px" data-asf-id-filter placeholder="输入售后单号" value="${S.escapeHtml(ui.asFundAftersaleId)}">
          <button class="btn btn-primary btn-sm" data-asf-filter>筛选</button>
          <button class="btn btn-secondary btn-sm" data-asf-filter-reset>重置</button>
        </div>
        <div class="batch-toolbar">
          <button class="btn btn-primary btn-sm" data-batch-verify-asf ${ui.selectedAsFunds.length ? '' : 'disabled'}>
            批量核销待冲抵（${ui.selectedAsFunds.length}）
          </button>
        </div>
        <div class="list-panel" style="border:none">
          <table class="data-table">
            <thead><tr>
              <th></th><th>售后单号</th><th>关联订单号</th><th>店铺名称</th>
              <th>退款金额</th><th>平台承担</th><th>店铺承担</th><th>冲抵状态</th><th>操作</th>
            </tr></thead>
            <tbody>${rows || '<tr class="no-click"><td colspan="9" class="empty-state">暂无售后资金记录</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }

  function showVerifyFundModal(aftersaleIds) {
    const ids = (aftersaleIds || []).slice();
    const funds = ids.map((id) => (state.aftersaleFunds || []).find((f) => f.aftersaleId === id)).filter(Boolean);
    const total = funds.reduce((s, f) => s + (f.shopPayable || 0), 0);
    const isBatch = ids.length > 1;
    const title = isBatch ? `批量核销待冲抵（${ids.length} 笔）` : `核销待冲抵 · ${S.escapeHtml(ids[0])}`;

    openModal(`<div class="modal">
      <div class="modal-header"><strong>${title}</strong><button class="btn-ghost" data-modal-close><i class="ri-close-line"></i></button></div>
      <div class="modal-body">
        <div class="alert alert-warning">确认店铺线下转账已核实到账。核销后冲抵状态变为「已核销」，店铺「待冲抵」余额将扣减 <strong>${S.fmtMoney(total)}</strong>。</div>
        ${isBatch ? `<div class="form-group"><label class="form-label">核销明细</label>
          <div style="font-size:13px;line-height:1.8;color:var(--gray-600)">
            ${funds.map((f) => `${S.escapeHtml(f.aftersaleId)} · 店铺承担 ${S.fmtMoney(f.shopPayable)}`).join('<br>')}
          </div></div>` : `<div class="detail-grid" style="margin-bottom:12px">
          <div class="detail-item"><label>退款金额</label><span>${S.fmtMoney(funds[0]?.refundAmount)}</span></div>
          <div class="detail-item"><label>店铺承担</label><span style="color:var(--danger);font-weight:600">${S.fmtMoney(funds[0]?.shopPayable)}</span></div>
          <div class="detail-item"><label>关联订单</label><span>${S.escapeHtml(funds[0]?.orderId)}</span></div>
          <div class="detail-item"><label>店铺</label><span>${S.escapeHtml(funds[0]?.shopName)}</span></div>
        </div>`}
        <div class="form-group"><label class="form-label">核销备注</label>
          <input class="form-input" id="verify-asf-note" placeholder="选填，如：对公转账已核实、批量核销等" value="${isBatch ? '批量核销' : ''}"></div>
        ${buildVoucherUploadHtml('verify-voucher-input', 'verify-voucher-list', '上传转账凭证', '选填，支持上传多张截图')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal-close>取消</button>
        <button class="btn btn-primary" data-confirm-verify-asf>确认核销</button>
      </div>
    </div>`);
    bindModalClose();
    const collectVouchers = bindVoucherUpload('verify-voucher-input', 'verify-voucher-list');
    document.querySelector('[data-confirm-verify-asf]')?.addEventListener('click', () => {
      const r = S.verifyAftersaleFunds(state, ids, {
        operator: '财务专员',
        note: document.getElementById('verify-asf-note')?.value || '',
        vouchers: collectVouchers(),
      });
      ui.selectedAsFunds = [];
      closeOverlay();
      if (r.ok) { toast(`已核销 ${r.count} 笔，合计 ${S.fmtMoney(r.amount)}`); render(); } else toast(r.msg);
    });
  }

  function getReportFilters() {
    return {
      startDate: ui.reportDateStart,
      endDate: ui.reportDateEnd,
      shopName: ui.reportShop,
    };
  }

  function renderFinancialReport() {
    const filters = getReportFilters();
    const rows = S.getFinancialReport(state, filters);
    const totalOrderAmount = rows.reduce((s, o) => s + o.userPaid, 0);
    const totalShop = rows.reduce((s, o) => s + (o.shopSettle ?? o.settleAmount), 0);
    const totalFee = rows.reduce((s, o) => s + o.platformFee, 0);
    const totalPayFee = rows.reduce((s, o) => s + (o.paymentFee || 0), 0);
    const totalComp = rows.reduce((s, o) => s + (o.compensation || 0), 0);
    const shopOpts = S.getReportShopOptions(state).map((name) =>
      `<option value="${S.escapeHtml(name)}" ${ui.reportShop === name ? 'selected' : ''}>${S.escapeHtml(name)}</option>`).join('');

    const tableRows = rows.map((o) => `<tr class="no-click">
      <td>${S.escapeHtml(o.id)}</td><td>${S.escapeHtml(o.shopName || state.merchant.name)}</td><td>${S.escapeHtml(o.productName)}</td>
      <td>${S.fmtMoney(o.userPaid)}</td><td>${S.fmtMoney(o.shopSettle ?? o.settleAmount)}</td>
      <td>${S.fmtMoney(o.platformFee)}</td><td>${S.fmtMoney(o.paymentFee || 0)}</td><td>${S.fmtMoney(o.compensation)}</td>
    </tr>`).join('');

    return `<div class="page-toolbar">
        <h2 class="page-title">财务报表</h2>
      </div>
      <div class="alert alert-info">按自定义时间范围生成销售流水报表（订单维度），用于报税、平台结算与合规结算。数据源与结算单无关。</div>
      <div class="filter-bar">
        <label>开始日期</label>
        <input class="form-input" type="date" style="width:160px" data-report-start value="${ui.reportDateStart}">
        <label>结束日期</label>
        <input class="form-input" type="date" style="width:160px" data-report-end value="${ui.reportDateEnd}">
        <label>店铺</label>
        <select class="form-select" style="width:180px" data-report-shop>
          <option value="">全部店铺</option>${shopOpts}
        </select>
        <button class="btn btn-primary btn-sm" data-report-export><i class="ri-download-line"></i> 导出报表</button>
      </div>
      <div class="report-summary">
        <div class="report-card"><div class="label">订单数</div><div class="value">${rows.length}</div></div>
        <div class="report-card"><div class="label">订单金额合计</div><div class="value">${S.fmtMoney(totalOrderAmount)}</div></div>
        <div class="report-card"><div class="label">店铺应结算</div><div class="value">${S.fmtMoney(totalShop)}</div></div>
        <div class="report-card"><div class="label">平台服务费</div><div class="value">${S.fmtMoney(totalFee)}</div></div>
        <div class="report-card"><div class="label">支付服务费</div><div class="value">${S.fmtMoney(totalPayFee)}</div></div>
        <div class="report-card"><div class="label">履约扣除</div><div class="value">${S.fmtMoney(totalComp)}</div></div>
      </div>
      <div class="card-flat">
        <table class="data-table">
          <thead><tr><th>订单号</th><th>店铺名称</th><th>商品</th><th>用户实付</th><th>店铺应结算</th><th>平台服务费</th><th>支付服务费</th><th>履约扣除</th></tr></thead>
          <tbody>${tableRows || '<tr class="no-click"><td colspan="8" class="empty-state">所选条件下无已完成订单</td></tr>'}</tbody>
        </table>
      </div>`;
  }

  function renderShell(content) {
    const pendingAudit = (state.withdrawals || []).filter((w) => w.status === '待审核').length;
    const pendingStl = (state.settlements || []).filter((s) => s.status === '待打款').length;
    const refunding = (state.aftersales || []).filter((a) => a.status === '退款中').length;
    const pendingAsFund = S.getPendingAftersaleFundCount(state);

    document.getElementById('app-root').innerHTML = `
      <div class="app-shell">
        <aside class="app-sidebar">
          <div class="app-logo platform"><i class="ri-government-line"></i> 平台后台</div>
          <nav class="app-nav">
            <div class="app-nav-group">运营</div>
            <div class="app-nav-item ${route.page === 'aftersales' ? 'active' : ''}" data-nav="aftersales">
              <i class="ri-customer-service-2-line"></i> 售后处理${refunding ? `<span class="nav-badge">${refunding}</span>` : ''}
            </div>
            <div class="app-nav-item ${route.page === 'withdraw-audit' ? 'active' : ''}" data-nav="withdraw-audit">
              <i class="ri-checkbox-circle-line"></i> 提现审批${pendingAudit ? `<span class="nav-badge">${pendingAudit}</span>` : ''}
            </div>
            <div class="app-nav-group">财务</div>
            <div class="app-nav-item ${route.page === 'settlements' ? 'active' : ''}" data-nav="settlements">
              <i class="ri-bank-card-line"></i> 结算处理${pendingStl ? `<span class="nav-badge">${pendingStl}</span>` : ''}
            </div>
            <div class="app-nav-item ${route.page === 'aftersale-funds' ? 'active' : ''}" data-nav="aftersale-funds">
              <i class="ri-funds-line"></i> 售后资金${pendingAsFund ? `<span class="nav-badge">${pendingAsFund}</span>` : ''}
            </div>
            <div class="app-nav-item ${route.page === 'financial-report' ? 'active' : ''}" data-nav="financial-report">
              <i class="ri-file-chart-line"></i> 财务报表
            </div>
          </nav>
          <div class="app-sidebar-foot">
            <a href="bm-seller.html" target="_blank"><i class="ri-external-link-line"></i> 打开店铺端</a>
          </div>
        </aside>
        <main class="app-main">
          <header class="app-header">
            <span class="app-header-title">斑马优号 · 账务管理</span>
            <div class="app-header-actions">
              <span style="font-size:12px;color:var(--gray-400)">演示店铺：${S.escapeHtml(state.merchant.name)}</span>
              <button class="btn btn-secondary btn-sm" data-reset-demo><i class="ri-refresh-line"></i> 恢复演示数据</button>
            </div>
          </header>
          <div class="app-content">${content}</div>
        </main>
      </div>`;
  }

  function render() {
    state = S.loadState();
    let content = '';
    if (route.page === 'aftersales') content = renderAftersales();
    else if (route.page === 'withdraw-audit') content = renderWithdrawAudit();
    else if (route.page === 'settlements') content = renderSettlements();
    else if (route.page === 'aftersale-funds') content = renderAftersaleFunds();
    else if (route.page === 'financial-report' || route.page === 'monthly-report') content = renderFinancialReport();
    else content = renderAftersales();
    renderShell(content);
    bindEvents();
  }

  function bindEvents() {
    document.querySelectorAll('[data-nav]').forEach((el) => el.addEventListener('click', () => navigate(el.dataset.nav)));
    document.querySelectorAll('[data-as-tab]').forEach((el) => el.addEventListener('click', () => { ui.aftersaleTab = el.dataset.asTab; render(); }));
    document.querySelectorAll('[data-wd-tab]').forEach((el) => el.addEventListener('click', () => { ui.withdrawTab = el.dataset.wdTab; render(); }));
    document.querySelectorAll('[data-stl-tab]').forEach((el) => el.addEventListener('click', () => { ui.settlementTab = el.dataset.stlTab; render(); }));
    document.querySelectorAll('[data-asf-tab]').forEach((el) => el.addEventListener('click', () => { ui.asFundTab = el.dataset.asfTab; render(); }));
    document.querySelector('[data-asf-filter]')?.addEventListener('click', () => {
      ui.asFundShop = document.querySelector('[data-asf-shop-filter]')?.value || '';
      ui.asFundAftersaleId = document.querySelector('[data-asf-id-filter]')?.value?.trim() || '';
      render();
    });
    document.querySelector('[data-asf-filter-reset]')?.addEventListener('click', () => {
      ui.asFundShop = '';
      ui.asFundAftersaleId = '';
      render();
    });
    document.querySelectorAll('[data-asf-chk]').forEach((el) => el.addEventListener('change', () => {
      const id = el.dataset.asfChk;
      if (el.checked) { if (!ui.selectedAsFunds.includes(id)) ui.selectedAsFunds.push(id); }
      else ui.selectedAsFunds = ui.selectedAsFunds.filter((x) => x !== id);
      render();
    }));
    document.querySelectorAll('[data-verify-asf]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      showVerifyFundModal([el.dataset.verifyAsf]);
    }));
    document.querySelector('[data-batch-verify-asf]')?.addEventListener('click', () => showVerifyFundModal(ui.selectedAsFunds.slice()));
    document.querySelectorAll('[data-process-as]').forEach((el) => el.addEventListener('click', (e) => { e.stopPropagation(); showProcessAftersaleModal(el.dataset.processAs); }));
    document.querySelectorAll('[data-audit-wd]').forEach((el) => el.addEventListener('click', (e) => { e.stopPropagation(); showAuditModal(el.dataset.auditWd); }));
    document.querySelectorAll('[data-export-wd-stl]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      downloadCsv(S.exportSettlementCsv(state, el.dataset.exportWdStl), `${el.dataset.exportWdStl}.csv`);
    }));
    document.querySelectorAll('[data-view-wd]').forEach((el) => el.addEventListener('click', () => showAuditModal(el.dataset.viewWd)));
    document.querySelectorAll('[data-register-stl]').forEach((el) => el.addEventListener('click', (e) => { e.stopPropagation(); showSettlementPaymentModal(el.dataset.registerStl); }));
    document.querySelectorAll('[data-export-stl-row]').forEach((el) => el.addEventListener('click', (e) => {
      e.stopPropagation();
      downloadCsv(S.exportSettlementCsv(state, el.dataset.exportStlRow), `${el.dataset.exportStlRow}.csv`);
    }));
    document.querySelectorAll('[data-stl-chk]').forEach((el) => el.addEventListener('change', () => {
      const id = el.dataset.stlChk;
      if (el.checked) { if (!ui.selectedSettlements.includes(id)) ui.selectedSettlements.push(id); }
      else ui.selectedSettlements = ui.selectedSettlements.filter((x) => x !== id);
      render();
    }));
    document.querySelector('[data-batch-export]')?.addEventListener('click', () => {
      const ids = (state.settlements || []).filter((s) => s.status === '待打款').map((s) => s.id);
      downloadCsv(S.exportBatchTransferCsv(state, ids), '批量打款模板.csv');
    });
    document.querySelector('[data-batch-paid]')?.addEventListener('click', () => showBatchPaidModal());
    document.querySelector('[data-report-export]')?.addEventListener('click', () => {
      ui.reportDateStart = document.querySelector('[data-report-start]')?.value || ui.reportDateStart;
      ui.reportDateEnd = document.querySelector('[data-report-end]')?.value || ui.reportDateEnd;
      ui.reportShop = document.querySelector('[data-report-shop]')?.value || '';
      if (ui.reportDateStart > ui.reportDateEnd) {
        toast('开始日期不能晚于结束日期');
        return;
      }
      const filters = getReportFilters();
      downloadCsv(S.exportFinancialReportCsv(state, filters), `财务报表_${filters.startDate}_${filters.endDate}.csv`);
      render();
    });
    document.querySelector('[data-reset-demo]')?.addEventListener('click', () => {
      state = S.resetDemo();
      ui.selectedSettlements = [];
      ui.selectedAsFunds = [];
      toast('已恢复演示数据');
      render();
    });
  }

  window.PlatformApp = { closeModal(e) { if (!e || e.target.classList.contains('modal-overlay')) closeOverlay(); }, navigate, render };
  window.addEventListener('hashchange', () => { parseRoute(); render(); });
  parseRoute();
  render();
})();

  </script>
</body>
</html>
